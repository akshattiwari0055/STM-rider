<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB300;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6A00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon: Minimalist Wheel/Bike -->
  <g transform="translate(10, 10) scale(0.8)" filter="url(#shadow)">
    <circle cx="40" cy="50" r="35" fill="none" stroke="url(#grad)" stroke-width="8" />
    <circle cx="40" cy="50" r="15" fill="url(#grad)" />
    <path d="M40 15 L40 35 M40 65 L40 85 M15 50 L35 50 M65 50 L85 50" stroke="white" stroke-width="4" stroke-linecap="round" />
    <path d="M80 30 L120 30 M80 50 L130 50 M80 70 L110 70" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" opacity="0.8" />
  </g>

  <!-- Text -->
  <text x="130" y="65" font-family="Arial, sans-serif" font-weight="900" font-size="42" fill="white" letter-spacing="2">
    ELITE <tspan fill="url(#grad)">BIKES</tspan>
  </text>
  <text x="130" y="85" font-family="Arial, sans-serif" font-weight="600" font-size="12" fill="#999" letter-spacing="4">
    PREMIUM RENTALS
  </text>
</svg>
